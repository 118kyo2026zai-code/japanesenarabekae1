<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>英語語順プリント作成ツール</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            font-family: sans-serif;
        }

        .control-panel {
            width: 210mm;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        textarea {
            width: 100%;
            height: 120px;
            margin-top: 10px;
            font-size: 16px;
            padding: 10px;
            box-sizing: border-box;
        }

        .button-group {
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            margin-right: 10px;
            cursor: pointer;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
        }

        button.print-btn {
            background: #27ae60;
        }

        .page {
            width: 210mm;
            height: 297mm;
            padding: 10mm;
            margin: 10mm auto;
            background-color: white;
            box-sizing: border-box;
            border: 5px solid #4a90e2;
            position: relative;
        }

        .inner-border {
            width: 100%;
            height: 100%;
            border: 2px solid #4a90e2;
            padding: 10mm 10mm;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 24pt;
            margin: 0 0 20px 0;
            color: #2c3e50;
        }

        .name-section {
            text-align: right;
            font-size: 14pt;
            margin-bottom: 20px;
        }

        .name-input {
            border-bottom: 2px solid #333;
            display: inline-block;
            width: 200px;
        }

        .problem-list {
            display: block;
        }

        .problem-item {
            margin-bottom: 25px;
            border-bottom: 1px dotted #ccc;
            padding-bottom: 15px;
        }

        .number-box {
            display: inline-block;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
            border: 3px solid #4a90e2;
            color: #4a90e2;
            border-radius: 8px;
            margin-right: 15px;
            font-weight: bold;
            font-size: 14pt;
        }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 5px;
            margin-left: 55px;
        }

        .word-card {
            border: 2px solid #555;
            padding: 5px 15px;
            border-radius: 10px;
            background-color: #f2f2f2;
            font-size: 16pt;
            font-weight: bold;
        }

        .answer-line {
            display: block;
            margin-top: 10px;
            margin-left: 55px;
            border-bottom: 2px solid #333;
            height: 25px;
        }

        .deco-icon {
            font-size: 25px;
            margin-top: 10px;
            text-align: center;
        }

        @media print {
            .control-panel { display: none; }
            body { background-color: white; }
            .page { 
                margin: 0; 
                box-shadow: none; 
                -webkit-print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

<div class="control-panel">
    <div class="button-group">
        <button onclick="copyPrompt()">AIプロンプトをコピー</button>
        <button onclick="resetToDefault()">デフォルトに戻す</button>
        <button class="print-btn" onclick="window.print()">印刷する</button>
    </div>
    <p>ここに問題を入力（一行に一問。単語の間はカンマで区切る）</p>
    <textarea id="problemInput" oninput="generateWorksheet()"></textarea>
</div>

<div class="page" id="printArea">
    <div class="inner-border">
        <h1>えいごの　ごじゅんに　ならべかえよう</h1>
        <div class="name-section">なまえ（<span class="name-input"></span>）</div>
        <div class="problem-list" id="problemList">
        </div>
        
    </div>
</div>

<script>
    const defaultProblems = 
"わたしは,りんごを,たべる\nぼくは,かおを,あらう\nわたしは,みずを,のむ\nわたしたちは,サッカーを,する\nかれは,えを,かく";

    function copyPrompt() {
        const prompt = "以下の条件で、英語の語順学習プリント用の日本語の文章を5個作ってください。・小学校高学年向け・形式は「主語,目的語,動詞」の順番でカンマ区切りにする・第三文型(SVO)の文のみを使用する・主語は「わたし」「ぼく」「あなた」「あなたたち」「かれ」「かのじょ」「わたしたち」をランダムに混ぜる";
        navigator.clipboard.writeText(prompt);
        alert("プロンプトをコピーしました！AIに貼り付けてください。");
    }

    function resetToDefault() {
        document.getElementById('problemInput').value = defaultProblems;
        generateWorksheet();
    }

    function generateWorksheet() {
        const input = document.getElementById('problemInput').value;
        const list = document.getElementById('problemList');
        list.innerHTML = '';
        
        const lines = input.split('\n');
        lines.forEach((line, index) => {
            if (line.trim() === '') return;
            const words = line.split(',');
            
            const div = document.createElement('div');
            div.className = 'problem-item';
            
            let cards = '';
            words.forEach(word => {
                cards += '<span class="word-card">' + word + '</span>';
            });
            
            div.innerHTML = 
                '<div class="number-box">' + (index + 1) + '</div>' +
                '<div class="card-container">' + cards + '</div>' +
                '<div class="answer-line"></div>';
            list.appendChild(div);
        });
    }

    resetToDefault();
</script>
</body>
</html>
