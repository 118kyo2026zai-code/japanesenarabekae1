<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>英語語順プリント作成ツール</title>
    <style>
        /* レイアウト調整 */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            font-family: sans-serif;
        }

        /* 編集・操作エリア（印刷時は非表示） */
        .control-panel {
            width: 210mm;
            margin: 10px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        textarea {
            width: 100%;
            height: 150px;
            margin-top: 10px;
            font-size: 14px;
        }

        button {
            padding: 10px 20px;
            margin-right: 10px;
            cursor: pointer;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 4px;
        }

        /* 印刷用プリントエリア */
        .page {
            width: 210mm;
            height: 297mm;
            padding: 15mm;
            margin: 10mm auto;
            background-color: white;
            box-sizing: border-box;
            border: 4px double #4a90e2;
            position: relative;
        }

        h1 {
            text-align: center;
            font-size: 20pt;
            margin: 0 0 15px 0;
            color: #2c3e50;
        }

        .name-section {
            text-align: right;
            font-size: 12pt;
            margin-bottom: 15px;
        }

        .name-input {
            border-bottom: 2px solid #333;
            display: inline-block;
            width: 150px;
        }

        .problem-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .problem-item {
            margin-bottom: 10px;
            border-bottom: 1px dotted #ccc;
            padding-bottom: 5px;
        }

        .number-box {
            display: inline-block;
            width: 24px;
            height: 24px;
            line-height: 24px;
            text-align: center;
            background-color: #4a90e2;
            color: white;
            border-radius: 5px;
            margin-right: 5px;
            font-weight: bold;
            font-size: 12pt;
        }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 5px;
            margin-left: 30px;
        }

        .word-card {
            border: 2px solid #555;
            padding: 3px 8px;
            border-radius: 6px;
            background-color: #fff8e1;
            font-size: 13pt;
            font-weight: bold;
        }

        .answer-line {
            display: block;
            margin-left: 30px;
            border-bottom: 2px solid #333;
            height: 22px;
        }

        .deco-icon {
            font-size: 25px;
            margin-top: 15px;
            text-align: center;
        }

        /* 印刷設定 */
        @media print {
            .control-panel { display: none; }
            body { background-color: white; }
            .page { margin: 0; box-shadow: none; border: 4px double #4a90e2; }
        }
    </style>
</head>
<body>

<div class="control-panel">
    <button onclick="copyPrompt()">AIプロンプトをコピー</button>
    <button onclick="resetToDefault()">デフォルトに戻す</button>
    <p>ここに問題を入力（一行に一問。単語の間はカンマで区切る 例: わたしは,りんごを,たべる）</p>
    <textarea id="problemInput" oninput="generateWorksheet()"></textarea>
</div>

<div class="page" id="printArea">
    <h1>日本語を英語の語順にしよう①</h1>
    <div class="name-section">なまえ（<span class="name-input"></span>）</div>
    <div class="problem-list" id="problemList">
        <!-- JSで生成 -->
    </div>
    <div class="deco-icon">🍎 ✏️ ⭐ 😊</div>
</div>

<script>
    const defaultProblems = 
`わたしは,りんごを,たべる
ぼくは,かおを,あらう
わたしは,みずを,のむ
わたしたちは,サッカーを,する
かれは,えを,かく
あなたは,ほんを,よむ
かのじょは,テニスを,する
あなたたちは,パンを,たべる
わたしたちは,うたを,うたう
わたしは,ぼうしを,もつ`;

    function copyPrompt() {
        const prompt = "以下の条件で、英語の語順学習プリント用の日本語の文章を10個作ってください。・小学校高学年向け・形式は「主語,目的語,動詞」の順番でカンマ区切りにする・第三文型(SVO)の文のみを使用する・主語は「わたし」「ぼく」「あなた」「あなたたち」「かれ」「かのじょ」「わたしたち」をランダムに混ぜる";
        navigator.clipboard.writeText(prompt);
        alert("プロンプトをコピーしました！AIに貼り付けてください。");
    }

    function resetToDefault() {
        document.getElementById('problemInput').value = defaultProblems;
        generateWorksheet();
    }

    function generateWorksheet() {
        const input = document.getElementById('problemInput').value;
        const list = document.getElementById('problemList');
        list.innerHTML = '';
        
        const lines = input.split('\n');
        lines.forEach((line, index) => {
            if (line.trim() === '') return;
            const words = line.split(',');
            
            const div = document.createElement('div');
            div.className = 'problem-item';
            
            let cards = '';
            words.forEach(word => {
                cards += '<span class="word-card">' + word + '</span>';
            });
            
            div.innerHTML = 
                '<div class="number-box">' + (index + 1) + '</div>' +
                '<div class="card-container">' + cards + '</div>' +
                '<div class="answer-line"></div>';
            list.appendChild(div);
        });
    }

    // 初回読み込み
    resetToDefault();
</script>
</body>
</html>
