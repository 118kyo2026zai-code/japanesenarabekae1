<!DOCTYPE html>
<html lang="ja">

        /* Reset & General */
        body {
            margin: 0;
            padding: 0;
            background-color: #f8f8f8; /* ソフトな背景色 */
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            color: #333;
            line-height: 1.4;
        }

        /* Page Layout (A4) */
        .page {
            width: 210mm;
            height: 297mm;
            padding: 18mm 15mm; /* 余白のバランス調整 */
            margin: 10mm auto;
            background-color: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            border: 2px dashed #a3cef8; /* フレームとしての薄い破線 */
            border-radius: 15px; /* 角を丸くして親しみやすく */
        }

        /* Print Optimization */
        @media print {
            body { background-color: white; }
            .page {
                margin: 0;
                box-shadow: none;
                page-break-after: avoid;
                border: none; /* 印刷時はフレームを消す */
            }
        }
