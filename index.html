<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>日本語を英語の語順にしよう①</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fcfcfc;
            font-family: sans-serif;
            color: #333;
        }

        .page {
            width: 210mm;
            height: 297mm;
            padding: 20mm;
            margin: 10mm auto;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            box-sizing: border-box;
            border: 4px double #4a90e2;
            position: relative;
        }

        h1 {
            text-align: center;
            font-size: 24pt;
            margin-bottom: 30px;
            color: #2c3e50;
        }

        .name-section {
            text-align: right;
            font-size: 14pt;
            margin-bottom: 30px;
        }

        .name-input {
            border-bottom: 2px solid #333;
            display: inline-block;
            width: 200px;
        }

        .problem-item {
            margin-bottom: 40px;
            border-bottom: 1px dotted #ccc;
            padding-bottom: 20px;
        }

        .number-box {
            display: inline-block;
            width: 35px;
            height: 35px;
            line-height: 35px;
            text-align: center;
            background-color: #4a90e2;
            color: white;
            border-radius: 8px;
            margin-right: 15px;
            font-weight: bold;
        }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            margin-left: 55px;
        }

        .word-card {
            border: 2px solid #555;
            padding: 8px 15px;
            border-radius: 10px;
            background-color: #fff8e1;
            font-size: 18pt;
            font-weight: bold;
        }

        .answer-line {
            display: block;
            margin-top: 15px;
            margin-left: 55px;
            border-bottom: 2px solid #333;
            height: 40px;
            font-size: 18pt;
        }

        .deco-icon {
            font-size: 30px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="page">
    <h1>日本語を英語の語順にしよう①</h1>
    
    <div class="name-section">
        なまえ（<span class="name-input"></span>）
    </div>

    <div class="problem-item">
        <div class="number-box">1</div>
        <div class="card-container">
            <span class="word-card">わたしは</span>
            <span class="word-card">りんごを</span>
            <span class="word-card">たべる</span>
        </div>
        <div class="answer-line"></div>
    </div>

    <div class="problem-item">
        <div class="number-box">2</div>
        <div class="card-container">
            <span class="word-card">ぼくは</span>
            <span class="word-card">かおを</span>
            <span class="word-card">あらう</span>
        </div>
        <div class="answer-line"></div>
    </div>

    <div class="problem-item">
        <div class="number-box">3</div>
        <div class="card-container">
            <span class="word-card">わたしは</span>
            <span class="word-card">みずを</span>
            <span class="word-card">のむ</span>
        </div>
        <div class="answer-line"></div>
    </div>

    <div class="problem-item">
        <div class="number-box">4</div>
        <div class="card-container">
            <span class="word-card">わたしたちは</span>
            <span class="word-card">サッカーを</span>
            <span class="word-card">する</span>
        </div>
        <div class="answer-line"></div>
    </div>

    <div class="problem-item">
        <div class="number-box">5</div>
        <div class="card-container">
            <span class="word-card">かれは</span>
            <span class="word-card">えを</span>
            <span class="word-card">かく</span>
        </div>
        <div class="answer-line"></div>
    </div>

    <div class="deco-icon">
        🍎 ✏️ ⭐ 
    </div>
</div>

</body>
</html>
